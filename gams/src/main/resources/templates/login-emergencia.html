<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAMS S.A.C - Acceso al Sistema</title>
    <link rel="stylesheet" href="/estilos/login.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Fondo animado -->
    <div class="background-animation">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
      </div>
    </div>

    <!-- Contenedor principal -->
    <div class="main-container">
      <!-- Header con logo -->
      <header class="header">
        <div class="logo-container">
          <div class="logo">
            <i class="fas fa-cube"></i>
          </div>
          <h1 class="company-name">GAMS S.A.C</h1>
          <p class="company-subtitle">Sistema de Gestión Inteligente</p>
        </div>
      </header>

      <!-- Contenido principal -->
      <main class="main-content">
        <div class="login-card">
          <div class="card-header">
            <h2>Acceso al Sistema</h2>
            <p>Ingresa tus credenciales para continuar</p>
          </div>

          <!-- Mensajes de error y logout -->
          <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">Error message</span>
          </div>

          <div th:if="${logout}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${logout}">Logout message</span>
          </div>

          <!-- Formulario de login de emergencia (todos los roles) -->
          <form
            class="login-form admin-form"
            id="loginForm"
            th:action="@{/login}"
            method="post"
          >
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <!-- Indica al failure handler que redirija de vuelta a esta ruta -->
            <input type="hidden" name="from" value="admin" />

            <div class="form-group">
              <label for="username">Usuario</label>
              <div class="input-group">
                <i class="fas fa-user"></i>
                <input
                  type="text"
                  id="username"
                  name="username"
                  required
                  placeholder="Ingresa tu usuario"
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <div class="input-group">
                <i class="fas fa-lock"></i>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  placeholder="Ingresa tu contraseña"
                  autocomplete="current-password"
                />
                <button type="button" class="toggle-password" id="togglePassword">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
              <i class="fas fa-sign-in-alt"></i>
              Iniciar Sesión
            </button>
          </form>
        </div>

        <!-- Estado del sistema -->
        <div class="system-status">
          <div class="status-indicator">
            <div class="status-dot online"></div>
            <span>Sistema Activo</span>
          </div>
          <div class="current-time" id="currentTime"></div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2025 GAMS S.A.C. Todos los derechos reservados.</p>
      </footer>
    </div>

    <!-- Notificaciones Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
      document.getElementById("togglePassword").addEventListener("click", function () {
        const input = document.getElementById("password");
        const icon = this.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      });

      function updateClock() {
        const el = document.getElementById("currentTime");
        if (el) {
          el.textContent = new Date().toLocaleString("es-PE", {
            weekday: "long", year: "numeric", month: "long",
            day: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit",
          });
        }
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
